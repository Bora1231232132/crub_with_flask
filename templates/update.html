{% extends 'base.html' %}

{% block head %}
    <title>Update Task</title>
{% endblock %}

{% block body %}
    <div class="content">
        <h1>Update Task</h1>
        <form action="/update/{{ task.id }}" method="POST">
            <input type="text" name="content" value="{{ task.content }}" id="content" />
            <button type="submit" value="Update Task" id="btn_update">Update Task</button>
        </form>
    </div>
{% endblock %}
